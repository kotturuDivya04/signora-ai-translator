<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SignOra | Speech to Sign</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Main Styles -->
    <link rel="stylesheet" href="/static/styles/style.css">

    <!-- Three.js Import -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>

<body class="work-bg">

<!-- ===== NAVBAR ===== -->
<header class="app-header">

    <!-- Back Button -->
    <a href="/home" class="navbar-back-btn">←</a>

    <div class="logo-container">
        <img src="/static/assets/logo.png" alt="SignOra Logo" class="app-logo">
        <span class="app-name">SignOra</span>
    </div>

</header>

<!-- ===== MAIN CONTENT ===== -->
<div class="page-container">

    <h1 class="page-title">Speech → Sign (Avatar Mode)</h1>

    <!-- Mic Button -->
    <button class="mic-btn" id="mic-btn">🎤 Start Listening</button>

    <!-- Speech Output -->
    <div class="speech-box">
        <h3>Recognized Speech:</h3>
        <p id="speech-text">Click the button and speak...</p>
    </div>

    <!-- Avatar Container -->
    <div class="avatar-box" id="avatarBox">
        <div id="loading-text">Loading Avatar...</div>
    </div>

</div>

<!-- Avatar Script (Three.js + animations) -->
<script type="module" src="/static/js/script-avatar.js"></script>

<!-- Speech Recognition Script -->
<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechRecognition) {

    const recognition = new SpeechRecognition();
    recognition.lang = "en-IN";
    recognition.continuous = false;
    recognition.interimResults = false;

    const micBtn = document.getElementById("mic-btn");
    const speechText = document.getElementById("speech-text");

    let listening = false;

    micBtn.addEventListener("click", () => {
        if (!listening) {
            recognition.start();
            micBtn.textContent = "🛑 Stop Listening";
            speechText.textContent = "🎤 Listening... Speak now!";
            speechText.style.color = "blue";
            listening = true;
        } else {
            recognition.stop();
            micBtn.textContent = "🎤 Start Listening";
            listening = false;
        }
    });

    recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;

        speechText.textContent = "🗣 " + text;
        speechText.style.color = "#333";

        // Send word to avatar animation
        if (window.signWord) {
            window.signWord(text);
        } else {
            console.warn("Avatar not ready yet.");
        }
    };

    recognition.onend = () => {
        micBtn.textContent = "🎤 Start Listening";
        listening = false;
    };

    recognition.onerror = (e) => {
        speechText.textContent = "⚠ Error: " + e.error;
        speechText.style.color = "red";
    };

} else {
    alert("Speech Recognition not supported in this browser.");
}
</script>

</body>
</html>
