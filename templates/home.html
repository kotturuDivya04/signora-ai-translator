<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SignOra | Home</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/styles/style.css">
</head>

<body class="home-bg">

    <!-- TOP NAVBAR -->
    <header class="app-header">
        <div class="logo-container">
            <img src="/static/assets/logo.png" alt="SignOra Logo" class="app-logo">
            <span class="app-name">SignOra</span>
        </div>
    </header>

    <!-- HOME SECTION -->
    <div class="home-container">
        <h1 class="welcome-title">👋 Hello! Let's connect.</h1>
        <p class="choose-text">Choose your mode of communication:</p>

        <!-- BUTTON ROW -->
        <div class="button-row">

            <a href="/sign-to-speech" class="mode-btn sign-btn">
                <span>Sign → Speech Translation</span>
                <span class="btn-icon">🤟</span>
            </a>

            <a href="/speech-to-sign" class="mode-btn speech-btn">
                <span>Speech → Sign (Avatar)</span>
                <span class="btn-icon">🗣</span>
            </a>

            <a href="/about" class="mode-btn about-btn">
                <span>About & Help</span>
                <span class="btn-icon">🛡</span>
            </a>

        </div>
    </div>

</body>
</html>
