<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SignOra | Sign to Speech</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/styles/style.css">
</head>

<body class="work-bg">

<!-- ============================
     TOP NAVBAR
============================= -->
<header class="app-header">

    <a href="/home" class="navbar-back-btn">←</a>

    <div class="logo-container">
        <img src="/static/assets/logo.png" alt="Signora Logo" class="app-logo">
        <span class="app-name">SignOra</span>
    </div>

</header>

<!-- ============================
     MAIN CONTAINER
============================= -->
<div class="page-container">

    <h1 class="page-title">Sign → Speech Translation</h1>

    <!-- CAMERA AREA -->
    <div class="camera-box">
        <canvas id="overlay"></canvas>
        <p id="cameraStatus">Starting camera...</p>
    </div>

    <!-- hidden video -->
    <video id="camera" autoplay playsinline style="display:none;"></video>

    <!-- ============================
         DEVELOPER TOOLS (Hidden via CSS)
    =============================== -->
    <div class="dev-tools">

        <h3>Developer Tools (Data Collection)</h3>

        <label for="labelSelect">Select Label: </label>
        <select id="labelSelect" class="dev-select">
            <option value="NO SIGN">NO SIGN</option>
            <option value="I">I</option>
            <option value="HI">HI</option>
            <option value="OKAY">OKAY</option>
            <option value="NAME">NAME</option>
            <option value="YES">YES</option>
            <option value="WATER">WATER</option>
            <option value="SORRY">SORRY</option>
            <option value="YOU">YOU</option>
        </select>

        <button id="recordBtn" class="dev-btn">Record Static Sample</button>
        <button id="staticStopBtn" class="dev-btn">⏹ Stop Static Recording</button>
        <button id="downloadBtn" class="dev-btn">Download Static CSV</button>

        <button id="motionStartBtn" class="dev-btn"
                onclick="startMotion(labelSelect.value)">
            ▶ Start Motion Recording
        </button>

        <button id="motionStopBtn" class="dev-btn"
                onclick="stopMotion()">
            ⏹ Stop Motion Recording
        </button>

        <button id="motionDownloadBtn" class="dev-btn"
                onclick="downloadMotionCSV()">
            💾 Download Motion CSV
        </button>
    </div>

    <!-- ============================
         PREDICTION BOX
    =============================== -->
    <div class="prediction-box">
        <h2>
            Prediction:
            <span id="prediction">--</span>
        </h2>

        <div id="motionCounter"></div>

        <div style="display:flex; align-items:center; gap:8px;">

            <!-- Language selector -->
            <select id="languageSelect" aria-label="Select language"
                    style="height:26px; font-size:13px; padding:2px 6px;">
                <option value="en">EN</option>
                <option value="hi">HI</option>
                <option value="te">TE</option>
                <option value="ta">TA</option>
            </select>

            <!-- Speak again -->
            <button class="speak-btn"
                onclick="speakPrediction(document.getElementById('prediction').textContent)">
                🔊 Speak again
            </button>

        </div>
    </div>

</div>

<!-- ============================
     MediaPipe Libraries
============================= -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<!-- Your JS -->
<script src="/static/js/script.js"></script>

<script>
    window.onload = async () => {
        setupMediaPipe();
        await startCamera();
        document.getElementById("cameraStatus").style.display = "none";
    };
</script>

</body>
</html>
